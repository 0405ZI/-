<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>探索教育 校園解謎</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:20px}
body{font-family:"Noto Sans TC",sans-serif;background:#0f0f1a;color:#e8e0d0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem}
.container{width:100%;max-width:560px;margin:0 auto}
.screen{display:none}
.screen.active{display:block}

/* TITLE */
.title-wrap{text-align:center;padding:2.5rem 1.5rem 2rem;background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);border-radius:20px;position:relative;overflow:hidden}
.title-wrap::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(83,74,183,.2),transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(29,158,117,.15),transparent 60%);pointer-events:none}
.title-wrap h1{font-family:"Noto Serif TC",serif;font-size:2.2rem;font-weight:700;color:#e8d5b7;line-height:1.4;margin-bottom:.3rem}
.title-wrap .sub{font-size:1.05rem;color:rgba(232,213,183,.5);margin-bottom:2rem}
.name-box{background:rgba(255,255,255,.06);border:1px solid rgba(232,213,183,.2);border-radius:12px;padding:1.2rem;margin-bottom:1.5rem;text-align:left}
.name-box label{display:block;font-size:.9rem;color:rgba(232,213,183,.6);letter-spacing:.05em;margin-bottom:.5rem}
.name-box input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(232,213,183,.25);border-radius:8px;padding:.8rem 1rem;color:#e8d5b7;font-size:1.2rem;font-family:"Noto Sans TC",sans-serif;outline:none;transition:border-color .2s}
.name-box input:focus{border-color:rgba(232,213,183,.6)}
.name-box input::placeholder{color:rgba(232,213,183,.25)}
.btn-primary{display:inline-block;background:linear-gradient(135deg,#534AB7,#1D9E75);color:#fff;border:none;border-radius:12px;padding:1rem 2.5rem;font-size:1.15rem;font-family:"Noto Sans TC",sans-serif;font-weight:700;cursor:pointer;transition:opacity .15s,transform .15s;letter-spacing:.05em}
.btn-primary:hover{opacity:.88}
.btn-primary:active{transform:scale(.97)}

/* ROUTE */
.route-wrap{padding:2rem 1.25rem;background:linear-gradient(160deg,#1a1a2e,#0f3460);border-radius:20px;text-align:center}
.route-wrap h2{font-family:"Noto Serif TC",serif;font-size:1.6rem;color:#e8d5b7;margin-bottom:.4rem}
.route-wrap p{font-size:1rem;color:rgba(232,213,183,.5);margin-bottom:2rem}
.route-cards{display:grid;grid-template-columns:1fr;gap:1rem}
.route-card{background:rgba(255,255,255,.06);border:1px solid rgba(232,213,183,.15);border-radius:14px;padding:1.5rem 1.25rem;cursor:pointer;transition:all .2s;text-align:center;display:flex;align-items:center;gap:1rem}
.route-card:hover{background:rgba(255,255,255,.1);border-color:rgba(232,213,183,.35);transform:translateX(4px)}
.route-card .icon{font-size:2.8rem;flex-shrink:0}
.route-card-text{text-align:left}
.route-card h3{font-size:1.2rem;color:#e8d5b7;font-weight:700;margin-bottom:.2rem}
.route-card p{font-size:.95rem;color:rgba(232,213,183,.5);line-height:1.5}

/* STAGE */
.stage-header{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:1rem 1.25rem;border-radius:16px 16px 0 0;display:flex;align-items:center;gap:.75rem}
.badge{background:rgba(83,74,183,.4);border:1px solid rgba(83,74,183,.6);color:#b5a6f0;font-size:.85rem;padding:.3rem .9rem;border-radius:20px;white-space:nowrap;font-weight:500}
.stage-title{font-family:"Noto Serif TC",serif;font-size:1.1rem;color:#e8d5b7;font-weight:700}
.stage-body{background:#fff;color:#1a1a2e;border:1px solid #ddd;border-top:none;border-radius:0 0 16px 16px;padding:1.3rem}
.progress-wrap{background:#e0e0e0;border-radius:20px;height:7px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#534AB7,#1D9E75);border-radius:20px;transition:width .4s ease}

.narrative{font-size:1.05rem;color:#333;line-height:2;margin-bottom:1rem;padding:1rem 1.1rem;background:#f8f5f0;border-radius:8px;border-left:4px solid #534AB7}
.warn-box{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:.75rem 1rem;font-size:.95rem;color:#856404;margin-bottom:1rem}
.img-wrap{border:1px solid #ccc;border-radius:10px;overflow:hidden;margin-bottom:1rem;background:#fafafa}
.img-wrap img{width:100%;height:auto;display:block}

/* coffee stain table */
.doc-wrap{background:#fafafa;border:1px solid #ccc;border-radius:8px;padding:1rem;margin-bottom:1rem;position:relative}
.doc-title{text-align:center;font-weight:700;font-size:1rem;color:#1a1a2e;margin-bottom:.75rem;letter-spacing:.08em}
.form-table{width:100%;border-collapse:collapse;font-size:.95rem}
.form-table th{background:#1a1a2e;color:#e8d5b7;padding:.55rem .7rem;text-align:center;font-weight:500}
.form-table td{border:1px solid #ccc;padding:.55rem .7rem;text-align:center;font-size:1rem}
.form-table tr:nth-child(even) td{background:#f5f5f5}

.kw{font-weight:700;text-decoration:underline}
.q-num{font-size:.8rem;font-weight:500;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.4rem}
.q-text{font-size:1.05rem;color:#1a1a2e;font-weight:500;margin-bottom:.75rem;line-height:1.8}
.ans-input{width:100%;border:2px solid #bbb;border-radius:8px;padding:.8rem 1rem;font-size:1.15rem;font-family:"Noto Sans TC",sans-serif;outline:none;color:#1a1a2e;background:#fff;transition:border-color .2s}
.ans-input:focus{border-color:#534AB7}
.ans-input.correct{border-color:#1D9E75;background:#e1f5ee;color:#0F6E56}
.ans-input.wrong{border-color:#E24B4A;background:#fff0f0}
.hint{margin-top:.5rem;font-size:.9rem;color:#888;min-height:1.3em}
.hint.err{color:#A32D2D}
.hint.ok{color:#0F6E56;font-weight:700}
.submit-btn{margin-top:.85rem;background:#534AB7;color:#fff;border:none;border-radius:10px;padding:.85rem 1.8rem;font-size:1.05rem;font-family:"Noto Sans TC",sans-serif;font-weight:700;cursor:pointer;transition:opacity .15s}
.submit-btn:hover{opacity:.85}
.submit-btn:disabled{opacity:.35;cursor:not-allowed}

/* FINAL */
.final-wrap{text-align:center;padding:3rem 1.5rem;background:linear-gradient(160deg,#1a1a2e,#0f3460);border-radius:20px}
.trophy{font-size:3.8rem;margin-bottom:.8rem;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.final-wrap h2{font-family:"Noto Serif TC",serif;font-size:1.9rem;color:#e8d5b7;margin-bottom:.5rem}
.player-tag{background:rgba(83,74,183,.3);border:1px solid rgba(83,74,183,.5);border-radius:8px;padding:.5rem 1.5rem;color:#b5a6f0;font-size:1rem;display:inline-block;margin:.75rem 0}
.final-wrap p{color:rgba(232,213,183,.65);font-size:1rem;margin-bottom:.4rem;line-height:1.8}
.submit-form-btn{display:inline-block;margin-top:1.25rem;background:linear-gradient(135deg,#534AB7,#1D9E75);color:#fff;border:none;border-radius:12px;padding:1rem 2rem;font-size:1.1rem;font-family:"Noto Sans TC",sans-serif;font-weight:700;cursor:pointer;letter-spacing:.05em;text-decoration:none;transition:opacity .15s}
.submit-form-btn:hover{opacity:.88}
.home-btn{display:inline-block;margin-top:.9rem;background:rgba(255,255,255,.1);border:1px solid rgba(232,213,183,.3);color:#e8d5b7;border-radius:12px;padding:.85rem 2rem;font-size:1rem;font-family:"Noto Sans TC",sans-serif;font-weight:500;cursor:pointer;letter-spacing:.05em;text-decoration:none;transition:opacity .15s;width:100%}
.home-btn:hover{background:rgba(255,255,255,.18)}
.show-msg{font-size:.85rem;color:rgba(232,213,183,.35);font-style:italic;margin-top:.8rem}
.btn-row{display:flex;flex-direction:column;align-items:center;gap:.75rem;margin-top:1.25rem}
</style>
</head>
<body>
<div class="container">

<!-- TITLE -->
<div class="screen active" id="screen-title">
  <div class="title-wrap">
    <h1>校園解謎</h1>
    <p class="sub">選擇你的路線，開始挑戰！</p>
    <div class="name-box">
      <label>全員姓名</label>
      <input type="text" id="player-name" placeholder="請輸入全員姓名…">
    </div>
    <button class="btn-primary" onclick="goRoute()">下一步 →</button>
  </div>
</div>

<!-- ROUTE SELECT -->
<div class="screen" id="screen-route">
  <div class="route-wrap">
    <h2>選擇路線</h2>
    <p>每條路線有不同謎題，選好就開始！</p>
    <div class="route-cards">
      <div class="route-card" onclick="startRoute('A')">
        <div class="icon">🏃</div>
        <div class="route-card-text">
          <h3>A 路線</h3>
          <p>訓練前・社團與競賽</p>
        </div>
      </div>
      <div class="route-card" onclick="startRoute('B')">
        <div class="icon">🧗</div>
        <div class="route-card-text">
          <h3>B 路線</h3>
          <p>訓練中・攀岩與健身</p>
        </div>
      </div>
      <div class="route-card" onclick="startRoute('C')">
        <div class="icon">👀</div>
        <div class="route-card-text">
          <h3>C 路線</h3>
          <p>觀眾・賽事與美食</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STAGE -->
<div class="screen" id="screen-stage">
  <div class="stage-header">
    <span class="badge" id="s-badge"></span>
    <span class="stage-title" id="s-title"></span>
  </div>
  <div class="stage-body">
    <div class="progress-wrap"><div class="progress-fill" id="s-progress" style="width:0%"></div></div>
    <div id="s-content"></div>
  </div>
</div>

<!-- FINAL -->
<div class="screen" id="screen-final">
  <div class="final-wrap">
    <div class="trophy">🏆</div>
    <h2>闖關成功！</h2>
    <div class="player-tag" id="final-name"></div>
    <p>恭喜完成所有挑戰！<br>請按下方按鈕回報完成。</p>
    <div class="btn-row">
      <a class="submit-form-btn" href="https://forms.gle/zHS98JKuWb2ec61g7" target="_blank">📋 點此回報完成</a>
      <button class="home-btn" onclick="goHome()">🏠 回到首頁（換路線）</button>
    </div>
    <p class="show-msg">請出示此畫面到指定地點找老師點名</p>
  </div>
</div>

</div>

        answers:["2109"],
        html:`
          <div class="narrative">吃飽休息完，還有<span class="kw">晚上的賽事</span>！晚上賽事都是室內有冷氣的。不過大會有限定離場時間，別待太晚。</div>
          <div class="q-num">問題 4 / 4</div>
          <div class="q-text"><span class="kw">離場時間</span>為？</div>
          <input class="ans-input" type="text" id="ans" placeholder="請輸入時間">
          <div class="hint" id="hint"></div>
          <button class="submit-btn" onclick="checkAns()">確認</button>`
      }
    ]
  }
};

let playerName="", currentRoute=null, currentStage=0;

function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

function goRoute(){
  const n=document.getElementById("player-name").value.trim();
  if(!n){document.getElementById("player-name").focus();return;}
  playerName=n;
  show("screen-route");
}

function startRoute(r){
  currentRoute=r;currentStage=0;renderStage();
}

function renderStage(){
  const route=routes[currentRoute];
  const s=route.stages[currentStage];
  const total=route.stages.length;
  document.getElementById("s-badge").textContent=s.badge;
  document.getElementById("s-title").textContent=s.title;
  document.getElementById("s-content").innerHTML=s.html;
  document.getElementById("s-progress").style.width=(currentStage/total*100)+"%";
  show("screen-stage");
  window.scrollTo(0,0);
}

function normalize(str){return str.trim().replace(/\s/g,"").toLowerCase();}

function checkAns(){
  const route=routes[currentRoute];
  const s=route.stages[currentStage];
  const input=document.getElementById("ans");
  const hint=document.getElementById("hint");
  const btn=document.querySelector(".submit-btn");
  const val=input.value.trim();
  if(!val){hint.className="hint err";hint.textContent="請輸入答案後再確認！";return;}
  const correct=s.answers.some(a=>normalize(a)===normalize(val));
  if(correct){
    input.classList.add("correct");input.classList.remove("wrong");
    hint.className="hint ok";hint.textContent="✓ 正確！前往下一關…";
    btn.disabled=true;input.disabled=true;
    setTimeout(()=>{
      currentStage++;
      if(currentStage<route.stages.length){renderStage();}
      else{showFinal();}
    },1000);
  } else {
    input.classList.add("wrong");input.classList.remove("correct");
    hint.className="hint err";hint.textContent="✗ 答案不對，再試試看！";
    setTimeout(()=>{input.classList.remove("wrong");hint.textContent="";},1800);
  }
}

function showFinal(){
  document.getElementById("final-name").textContent="玩家："+playerName+"　路線："+currentRoute;
  show("screen-final");
  window.scrollTo(0,0);
}

function goHome(){
  document.getElementById("player-name").value="";
  show("screen-title");
  window.scrollTo(0,0);
}

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const btn=document.querySelector(".submit-btn:not(:disabled)");
    if(btn)btn.click();
  }
});
</script>
</body>
</html>
